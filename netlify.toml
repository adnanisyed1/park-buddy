# Netlify deploy config for this Next.js app.
# The official Next Runtime plugin turns /api/nps into a serverless function automatically.
[build]
  command = "next build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# A multi-round agent loop (app/api/agent) can exceed the 10s default.
# 26s is the max on the Netlify Pro plan.
[functions]
  included_files = []

[functions."___netlify-server-handler"]
  timeout = 26
