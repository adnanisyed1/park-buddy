<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pines — "find your people" Campfire beat (screen-record me)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#08130d; --bg2:#0a1712; --ink:#f4f1ea; --muted:#aab0ba; --gold-a:#e8cf9a; --gold-b:#c9a35f; --gold-soft:#d9b779; --ember:#f2a35a; }
  *{margin:0;box-sizing:border-box}
  html,body{height:100%}
  body{ background:linear-gradient(160deg,var(--bg2),var(--bg) 70%); color:var(--ink);
    font-family:'Space Mono',monospace; display:flex; align-items:center; justify-content:center; height:100vh; overflow:hidden; cursor:pointer; }
  .stage{ position:relative; width:min(100vw,177.78vh); aspect-ratio:16/9; overflow:hidden;
    display:flex; flex-direction:column; align-items:center; justify-content:center; }
  /* warm fire glow rising from the bottom */
  .glow{ position:absolute; left:50%; bottom:-18%; transform:translateX(-50%); width:70%; aspect-ratio:1;
    background:radial-gradient(circle, rgba(242,163,90,.34), rgba(224,138,106,.12) 42%, transparent 66%);
    filter:blur(6px); animation:flicker 3.6s ease-in-out infinite; }
  @keyframes flicker{ 0%,100%{ opacity:.85; transform:translateX(-50%) scale(1); } 50%{ opacity:1; transform:translateX(-50%) scale(1.06); } }

  .eyebrow{ position:absolute; top:12%; left:0; right:0; text-align:center; font-size:clamp(.55rem,1.3vw,.9rem);
    letter-spacing:.28em; text-transform:uppercase; color:var(--gold-soft); opacity:0; animation:fade .9s .3s forwards; }
  .eyebrow .fire{ color:var(--ember); }

  /* messages gathering at the fire */
  .msgs{ position:relative; z-index:2; display:flex; flex-direction:column; gap:clamp(8px,1.4vh,16px); width:min(70%,760px); margin-bottom:6%; }
  .msg{ display:flex; align-items:flex-start; gap:.7em; opacity:0; transform:translateY(14px); }
  .msg.r{ flex-direction:row-reverse; }
  .m1{ animation:rise .7s 1.0s cubic-bezier(.16,.8,.24,1) forwards; }
  .m2{ animation:rise .7s 1.9s cubic-bezier(.16,.8,.24,1) forwards; }
  .m3{ animation:rise .7s 2.8s cubic-bezier(.16,.8,.24,1) forwards; }
  .av{ width:clamp(26px,3.4vw,40px); height:clamp(26px,3.4vw,40px); border-radius:50%; flex:none;
    background:linear-gradient(150deg,#1f5e46,#0e2016); border:1px solid var(--gold-b); display:flex; align-items:center; justify-content:center;
    font-family:'Cormorant Garamond',serif; font-weight:600; color:var(--gold-a); font-size:clamp(.7rem,1.4vw,1rem); }
  .bub{ background:rgba(255,255,255,.05); border:1px solid rgba(217,183,121,.22); border-radius:14px; padding:.7em 1em;
    font-size:clamp(.62rem,1.25vw,.95rem); line-height:1.45; color:var(--ink); max-width:80%; }
  .msg.r .bub{ background:linear-gradient(120deg,rgba(232,207,154,.18),rgba(201,163,95,.12)); border-color:rgba(217,183,121,.35); }

  /* payoff headline */
  .payoff{ position:absolute; z-index:3; left:0; right:0; bottom:16%; text-align:center; opacity:0;
    animation:rise 1.1s 3.9s cubic-bezier(.16,.8,.24,1) forwards; }
  .payoff .h{ font-family:'Cormorant Garamond',serif; font-weight:600; font-size:clamp(2rem,5vw,3.6rem); line-height:1;
    background:linear-gradient(120deg,var(--gold-a),var(--gold-b)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .payoff .s{ font-size:clamp(.55rem,1.2vw,.85rem); letter-spacing:.22em; text-transform:uppercase; color:var(--muted); margin-top:.9em; }

  /* drifting embers */
  .ember{ position:absolute; bottom:6%; width:5px; height:5px; border-radius:50%; background:var(--ember); opacity:0; filter:blur(.3px); }
  .ember:nth-child(1){ left:44%; animation:ember 4.2s 1.2s ease-out infinite; }
  .ember:nth-child(2){ left:52%; animation:ember 4.8s 2.0s ease-out infinite; }
  .ember:nth-child(3){ left:48%; animation:ember 4.4s 3.0s ease-out infinite; }
  .ember:nth-child(4){ left:56%; animation:ember 5.2s 2.6s ease-out infinite; }
  .ember:nth-child(5){ left:41%; animation:ember 5s 3.6s ease-out infinite; }
  @keyframes ember{ 0%{ opacity:0; transform:translateY(0) scale(.7); } 15%{ opacity:.9; } 100%{ opacity:0; transform:translateY(-60vh) translateX(20px) scale(1.2); } }

  @keyframes rise{ to{ opacity:1; transform:translateY(0); } }
  @keyframes fade{ to{ opacity:1; } }
  .hint{ position:fixed; bottom:14px; left:0; right:0; text-align:center; font-size:.58rem; letter-spacing:.1em; color:rgba(170,176,186,.35); }
  @media(prefers-reduced-motion:reduce){ *{animation-duration:.001s!important} }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="glow"></div>
    <span class="ember"></span><span class="ember"></span><span class="ember"></span><span class="ember"></span><span class="ember"></span>
    <div class="eyebrow">🔥 Rocky Mountain · <span class="fire">Campfire</span> · 128 around the fire</div>
    <div class="msgs">
      <div class="msg m1"><span class="av">D</span><div class="bub">Saw that bear too near Cub Lake — gave it space 🐻</div></div>
      <div class="msg r m2"><span class="av">B</span><div class="bub">Adding Bear Lake to my list for Saturday 😍</div></div>
      <div class="msg m3"><span class="av">M</span><div class="bub">Anyone up for the sunrise hike? Room for one more.</div></div>
    </div>
    <div class="payoff">
      <div class="h">Find your people.</div>
      <div class="s">Every park has a Campfire</div>
    </div>
  </div>
  <script>
    var s=document.getElementById('stage');
    function replay(){ s.style.display='none'; void s.offsetWidth; s.style.display='flex';
      s.querySelectorAll('*').forEach(function(el){ el.style.animation='none'; void el.offsetWidth; el.style.animation=''; }); }
    document.body.addEventListener('click', replay);
    document.body.addEventListener('keydown', function(e){ if(e.code==='Space'){ e.preventDefault(); replay(); } });
  </script>
</body>
</html>
