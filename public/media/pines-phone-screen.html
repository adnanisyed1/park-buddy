<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pines — phone screen (9:16, composite onto Ben's phone)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Space+Mono:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#08130d; --ink:#f4f1ea; --muted:#aab0ba; --gold-a:#e8cf9a; --gold-b:#c9a35f; --gold-soft:#d9b779; --go:#4fd98a; }
  *{margin:0;box-sizing:border-box}
  html,body{height:100%}
  body{ background:#000; display:flex; align-items:center; justify-content:center; height:100vh; overflow:hidden; font-family:'Inter',system-ui,sans-serif; }
  #wrap{ transform-origin:center; }
  /* the phone SCREEN only (no bezel) — fixed 9:16 (405×720), scaled to fit; maps onto the device screen */
  .screen{ width:405px; height:720px; background:var(--bg); overflow:hidden; display:flex; flex-direction:column; color:var(--ink); }

  .status{ display:flex; align-items:center; justify-content:space-between; padding:14px 22px 8px; flex:none; }
  .status .t{ font-family:'Space Mono',monospace; font-size:13px; color:var(--ink); font-weight:700; }
  .status .b{ display:inline-flex; align-items:center; gap:6px; font-family:'Cormorant Garamond',serif; font-weight:700; font-size:20px; }
  .status .b svg{ width:15px; height:15px; }
  .status .r{ font-family:'Space Mono',monospace; font-size:11px; color:var(--muted); }

  .body{ flex:1; min-height:0; padding:6px 22px 22px; display:flex; flex-direction:column; }
  .eyebrow{ font-family:'Space Mono',monospace; font-size:10px; letter-spacing:.22em; text-transform:uppercase; color:var(--gold-soft); flex:none; }

  .clip{ position:relative; width:100%; aspect-ratio:1/1; border-radius:16px; overflow:hidden; margin-top:11px; background:#000; flex:none; }
  .clip video{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  .clip .badge{ position:absolute; left:9px; bottom:9px; display:flex; gap:6px; }
  .chip{ font-family:'Space Mono',monospace; font-size:10px; color:#fff; background:rgba(8,19,13,.66); border:1px solid rgba(255,255,255,.22); border-radius:999px; padding:3px 8px; }
  .chip.go{ color:#0b1710; background:var(--go); border:none; font-weight:700; }

  .loc{ display:flex; align-items:center; gap:7px; margin-top:12px; background:rgba(255,255,255,.04); border:1px solid rgba(217,183,121,.18); border-radius:11px; padding:11px 12px; flex:none; }
  .loc b{ font-size:14px; color:var(--ink); }
  .loc .site{ margin-left:auto; font-family:'Space Mono',monospace; font-size:10px; color:var(--go); white-space:nowrap; }
  .cap{ margin-top:9px; background:rgba(255,255,255,.04); border:1px solid rgba(217,183,121,.18); border-radius:11px; padding:11px 12px; font-size:14px; color:var(--ink); flex:none; }

  .btn{ position:relative; margin-top:auto; width:100%; text-align:center; font-weight:700; font-size:15px; color:#0b1710;
    background:linear-gradient(120deg,var(--gold-a),var(--gold-b)); border-radius:13px; padding:14px; overflow:hidden; flex:none; }
  .btn .bar{ position:absolute; left:0; top:0; bottom:0; width:0; background:rgba(11,23,16,.28); }
  .btn .lbl{ position:relative; }
  .btn .up,.btn .done{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; gap:6px; opacity:0; }
  .live{ display:flex; align-items:center; justify-content:center; gap:8px; margin-top:12px; opacity:0; flex:none;
    background:rgba(255,255,255,.05); border:1px solid rgba(79,217,138,.4); border-radius:999px; padding:11px; font-family:'Space Mono',monospace; font-size:11px; color:var(--go); }
  .live b{ font-family:'Cormorant Garamond',serif; font-weight:600; font-size:16px; color:var(--ink); }

  /* looping post sequence (JS restarts .play each cycle) */
  .play .loc{ animation:rise .6s .2s both; }
  .play .cap{ animation:rise .6s .7s both; }
  .play .btn{ animation:press .5s 1.6s both; }
  .play .btn .lbl{ animation:fadeout .3s 2.1s forwards; }
  .play .btn .bar{ animation:fill 1.6s 2.1s cubic-bezier(.4,0,.2,1) forwards; }
  .play .btn .up{ animation:fade .3s 2.15s forwards, fadeout .3s 3.8s forwards; }
  .play .btn .done{ animation:fade .35s 3.85s forwards; }
  .play .live{ animation:rise .7s 4.1s both; }
  @keyframes rise{ from{ opacity:0; transform:translateY(9px);} to{ opacity:1; transform:none; } }
  @keyframes fade{ to{ opacity:1; } }
  @keyframes fadeout{ from{opacity:1;} to{ opacity:0; } }
  @keyframes fill{ to{ width:100%; } }
  @keyframes press{ 40%{transform:scale(1);} 60%{transform:scale(.97);} 100%{transform:scale(1);} }
</style>
</head>
<body>
  <div id="wrap">
    <div class="screen">
      <div class="status"><span class="t">9:41</span><span class="b"><svg viewBox="0 0 24 24" fill="#e8cf9a"><path d="M12 2l5 9h-3l5 9H5l5-9H7z"/><rect x="11" y="18" width="2" height="4"/></svg>Pines</span><span class="r">▲ ●</span></div>
      <div class="body" id="seq">
        <div class="eyebrow">New Pine · on-site only</div>
        <div class="clip">
          <!-- "Ben's clip" — a clean raw scenic clip (swap for his actual footage in your editor). -->
          <video src="https://fsgmwersernbtjugkuhk.supabase.co/storage/v1/object/public/pines/pines-clip.mp4" autoplay muted loop playsinline poster="pines-intro-poster.jpg"></video>
          <div class="badge"><span class="chip">📍 Bear Lake</span><span class="chip go">GO · 62°</span></div>
        </div>
        <div class="loc">📍 <b>Bear Lake · RMNP</b> <span class="site">◉ Verified on-site</span></div>
        <div class="cap">Golden hour at Bear Lake 🌄</div>
        <div class="btn"><span class="bar"></span><span class="lbl">Post Pine ↑</span><span class="up">Uploading…</span><span class="done">✓ Posted</span></div>
        <div class="live">🔥 Live in <b>Rocky Mountain</b> Campfire</div>
      </div>
    </div>
  </div>
<script>
  var wrap=document.getElementById('wrap');
  function fit(){ wrap.style.transform='scale(' + Math.min(1.4, (window.innerHeight-20)/720) + ')'; }
  fit(); window.addEventListener('resize', fit);
  var seq=document.getElementById('seq');
  function run(){ seq.classList.remove('play'); void seq.offsetWidth; seq.classList.add('play'); }
  run(); setInterval(run, 9000);
</script>
</body>
</html>
