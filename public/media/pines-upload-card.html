<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pines — "posts the Pine" upload beat (screen-record me)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#08130d; --bg2:#0a1712; --ink:#f4f1ea; --muted:#aab0ba; --gold-a:#e8cf9a; --gold-b:#c9a35f; --gold-soft:#d9b779; --go:#4fd98a; }
  *{margin:0;box-sizing:border-box}
  html,body{height:100%}
  body{ background:radial-gradient(120% 80% at 50% 40%, rgba(217,183,121,.07), transparent 60%), linear-gradient(160deg,var(--bg2),var(--bg) 72%);
    color:var(--ink); font-family:'Space Mono',monospace; display:flex; align-items:center; justify-content:center; height:100vh; overflow:hidden; cursor:pointer; }
  .stage{ width:min(100vw,177.78vh); aspect-ratio:16/9; position:relative; overflow:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:clamp(12px,2vh,22px); }
  /* full-frame fill: a blurred, darkened copy of the clip so the 16:9 frame is filled
     with our scenery/colors — no black bars, no dead space around the card. */
  .bgfill{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; transform:scale(1.15); filter:blur(46px) brightness(.42) saturate(1.15); z-index:0; }
  .bgtint{ position:absolute; inset:0; background:radial-gradient(120% 90% at 50% 40%, rgba(8,19,13,.35), rgba(8,19,13,.78)); z-index:0; }
  .stage > .eyebrow, .stage > .card, .stage > .live{ position:relative; z-index:2; }
  .eyebrow{ position:absolute; top:12%; left:0; right:0; text-align:center; font-size:clamp(.55rem,1.3vw,.9rem); letter-spacing:.28em; text-transform:uppercase; color:var(--gold-soft); opacity:0; animation:fade .8s .2s forwards; }

  .card{ width:min(42%,460px); background:rgba(10,23,16,.72); border:1px solid rgba(217,183,121,.24); border-radius:18px;
    padding:1.1em; box-shadow:0 34px 90px -40px rgba(0,0,0,.9); opacity:0; transform:translateY(22px) scale(.97);
    animation:cardIn 1s .4s cubic-bezier(.16,.8,.24,1) forwards; }
  .clip{ position:relative; width:100%; aspect-ratio:16/10; border-radius:12px; overflow:hidden; }
  .clip video{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  .clip .play{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:13%; aspect-ratio:1; border-radius:50%;
    background:rgba(8,19,13,.5); border:1px solid rgba(255,255,255,.6); display:flex; align-items:center; justify-content:center; color:#fff; font-size:1vw; animation:pulse 2.4s ease-in-out infinite; }
  .clip .dur{ position:absolute; right:.6em; bottom:.6em; font-size:clamp(.45rem,.9vw,.66rem); color:#fff; background:rgba(8,19,13,.6); border-radius:999px; padding:.2em .6em; }

  .loc{ display:flex; align-items:center; gap:.5em; margin-top:.8em; background:rgba(255,255,255,.03); border:1px solid rgba(217,183,121,.16);
    border-radius:10px; padding:.6em .7em; opacity:0; transform:translateY(8px); animation:rise .6s 1.5s cubic-bezier(.16,.8,.24,1) forwards; }
  .loc b{ font-size:clamp(.6rem,1.15vw,.85rem); color:var(--ink); }
  .loc .site{ margin-left:auto; font-size:clamp(.48rem,.95vw,.68rem); color:var(--go); }
  .cap{ margin-top:.6em; font-size:clamp(.6rem,1.15vw,.85rem); color:var(--ink); background:rgba(255,255,255,.03); border:1px solid rgba(217,183,121,.16);
    border-radius:10px; padding:.6em .7em; opacity:0; animation:fade .6s 2.1s forwards; }
  .cap .cur{ color:var(--gold-a); }

  .btn{ margin-top:.8em; width:100%; text-align:center; font-weight:700; font-size:clamp(.7rem,1.3vw,.95rem); color:#0b1710;
    background:linear-gradient(120deg,var(--gold-a),var(--gold-b)); border-radius:11px; padding:.8em; position:relative; overflow:hidden;
    animation:press .5s 2.8s cubic-bezier(.3,1.4,.5,1) both; }
  .btn .lbl{ animation:fadeout .3s 3.3s forwards; }             /* "Post Pine ↑" fades out as upload starts */
  .btn .bar{ position:absolute; left:0; top:0; bottom:0; width:0; background:rgba(11,23,16,.28); animation:fill 1.6s 3.3s cubic-bezier(.4,0,.2,1) forwards; }
  .btn .up{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; opacity:0; animation:fade .3s 3.35s forwards, fadeout .3s 5s forwards; }
  .btn .done{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; gap:.4em; opacity:0; color:#0b1710; animation:fade .4s 5.05s forwards; }

  .live{ text-align:center; opacity:0; animation:rise .7s 5.3s cubic-bezier(.16,.8,.24,1) forwards; }
  .live .pill{ display:inline-flex; align-items:center; gap:.5em; background:rgba(255,255,255,.05); border:1px solid rgba(79,217,138,.4);
    border-radius:999px; padding:.6em 1.1em; font-size:clamp(.55rem,1.1vw,.8rem); color:var(--go); }
  .live .pill b{ font-family:'Cormorant Garamond',serif; font-weight:600; font-size:clamp(.9rem,1.7vw,1.3rem); color:var(--ink); }

  @keyframes cardIn{ to{ opacity:1; transform:translateY(0) scale(1); } }
  @keyframes rise{ to{ opacity:1; transform:translateY(0); } }
  @keyframes fade{ to{ opacity:1; } }
  @keyframes fadeout{ from{ opacity:1; } to{ opacity:0; } }
  @keyframes fill{ to{ width:100%; } }
  @keyframes pulse{ 0%,100%{ opacity:.9; } 50%{ opacity:.4; } }
  @keyframes press{ 0%{ opacity:0; transform:scale(1); } 40%{ opacity:1; transform:scale(1); } 60%{ transform:scale(.96); } 100%{ opacity:1; transform:scale(1); } }
  .hint{ position:fixed; bottom:14px; left:0; right:0; text-align:center; font-size:.58rem; letter-spacing:.1em; color:rgba(170,176,186,.35); }
  @media(prefers-reduced-motion:reduce){ *{animation-duration:.001s!important} }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <video class="bgfill" src="https://fsgmwersernbtjugkuhk.supabase.co/storage/v1/object/public/pines/pines-clip.mp4" autoplay muted loop playsinline></video>
    <div class="bgtint"></div>
    <div class="eyebrow">Post a Pine · on-site only</div>
    <div class="card">
      <div class="clip"><video src="https://fsgmwersernbtjugkuhk.supabase.co/storage/v1/object/public/pines/pines-clip.mp4" autoplay muted loop playsinline poster="pines-intro-poster.jpg"></video><div class="play">▶</div><div class="dur">0:14</div></div>
      <div class="loc">📍 <b>Bear Lake · Rocky Mountain NP</b> <span class="site">◉ Verified on-site</span></div>
      <div class="cap">Golden hour at Bear Lake 🌄<span class="cur">|</span></div>
      <div class="btn">
        <span class="bar"></span>
        <span class="lbl">Post Pine ↑</span>
        <span class="up">Uploading…</span>
        <span class="done">✓ Posted</span>
      </div>
    </div>
    <div class="live"><span class="pill">🔥 Live in <b>Rocky Mountain</b> Campfire</span></div>
  </div>
  <script>
    var s=document.getElementById('stage');
    function replay(){ s.style.display='none'; void s.offsetWidth; s.style.display='flex';
      s.querySelectorAll('*').forEach(function(el){ el.style.animation='none'; void el.offsetWidth; el.style.animation=''; }); }
    document.body.addEventListener('click', replay);
    document.body.addEventListener('keydown', function(e){ if(e.code==='Space'){ e.preventDefault(); replay(); } });
  </script>
</body>
</html>
